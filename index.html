<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour toi</title>
    <style>
        /* --- IMPORTATION DES POLICES --- */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --bg-color: #fff0f3; /* Fond rose pastel très doux */
            --text-color: #4a3f35;
            --accent-pink: #ffb3c1; /* Rose pastel pour les boutons/éléments */
            --dark-pink: #ff4d6d; /* Rose soutenu pour le grand cœur */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- CONTENEUR PRINCIPAL CENTRÉ --- */
        .main-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #ff758f;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        /* Bouquet de fleurs poétique libre de droits */
        .flower-bouquet {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(255, 179, 193, 0.4);
            margin-bottom: 35px;
            animation: gentleFloat 4s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Bouton "clic" */
        .click-btn {
            background-color: white;
            color: #ff758f;
            border: 2px solid var(--accent-pink);
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 179, 193, 0.3);
        }

        .click-btn:hover {
            background-color: var(--accent-pink);
            color: white;
            transform: scale(1.05);
        }

        /* --- LE GRAND CŒUR SURPRISE (OVERLAY) --- */
        .overlay-heart {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 243, 0.85); /* Fond flouté rose */
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .overlay-heart.show {
            display: flex;
            opacity: 1;
        }

        /* Forme de cœur géant */
        .heart-shape {
            width: 320px;
            height: 290px;
            background-color: var(--dark-pink);
            position: relative;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 40px rgba(255, 77, 109, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .heart-shape::before,
        .heart-shape::after {
            content: "";
            position: absolute;
            top: 0;
            width: 320px;
            height: 290px;
            background-color: var(--dark-pink);
            border-radius: 160px 160px 0 0;
        }

        .heart-shape::before {
            left: 160px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-shape::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .overlay-heart.show .heart-shape {
            transform: scale(1.3); /* Zoom du cœur à l'ouverture */
        }

        /* Texte à l'intérieur du cœur */
        .heart-text {
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem; /* Ajusté pour rentrer parfaitement dans le coeur */
            line-height: 1.5;
            text-align: center;
            position: relative;
            z-index: 10;
            font-weight: 400;
            max-width: 240px;
        }

        .heart-text span {
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            display: block;
            margin-top: 5px;
        }

        /* Bouton fermer discret sous le cœur */
        .close-btn {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 4px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            z-index: 20;
        }

        /* --- PETITS COEURS VOLANTS AU CLIC EN ARRIÈRE PLAN --- */
        .mini-heart {
            position: absolute;
            color: var(--dark-pink);
            pointer-events: none;
            z-index: 5;
            animation: flyUp 2.5s ease-out forwards;
        }

        @keyframes flyUp {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            15% { opacity: 0.7; }
            100% { transform: translate(var(--x), var(--y)) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body onclick="spawnHearts(event)">

    <div class="main-container">
        <h1>Pour la future mère de mes enfants</h1>
        
        <img class="flower-bouquet" src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=500&auto=format&fit=crop" alt="Fleurs">
        
        <br>
        <button class="click-btn" onclick="openHeart(event)">clic</button>
    </div>

    <div class="overlay-heart" id="heartOverlay" onclick="closeHeart()">
        <div class="heart-shape" onclick="event.stopPropagation()">
            <div class="heart-text">
                Désolé du retard. J'étais en train de coder le site.<br><br>
                Je sais que c'est compliqué entre nous en ce moment. Mais je t'aime ma future femme de mes enfants. ❤️
                <button class="close-btn" onclick="closeHeart()">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('heartOverlay');

        function openHeart(e) {
            e.stopPropagation(); // Évite de déclencher d'autres clics
            overlay.classList.add('show');
            // Grosse explosion de cœurs au centre
            for(let i=0; i<15; i++) {
                createHeart(window.innerWidth / 2, window.innerHeight / 2);
            }
        }

        function closeHeart() {
            overlay.classList.remove('show');
        }

        // Fonction pour faire apparaître des petits cœurs n'importe où au clic
        function spawnHearts(e) {
            if(e.target.tagName === 'BUTTON') return;
            for(let i=0; i<4; i++) {
                createHeart(e.clientX, e.clientY);
            }
        }

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('mini-heart');
            heart.innerHTML = '❤️';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';

            // Directions aléatoires
            const randomX = (Math.random() - 0.5) * 250;
            const randomY = (Math.random() - 0.8) * 200; // Monte vers le haut
            heart.style.setProperty('--x', `${randomX}px`);
            heart.style.setProperty('--y', `${randomY}px`);
            
            heart.style.fontSize = (Math.random() * 12 + 10) + 'px';

            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2500);
        }
    </script>
</body>
</html>
