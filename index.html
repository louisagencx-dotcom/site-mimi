<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour toi</title>
    <style>
        /* --- POLICE DYNAMIQUE ET PROPRE --- */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #ffacc5; /* Ta couleur de fond exacte */
            --text-color: #ff5d8f; /* Ta couleur de texte exacte */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- PLUIE DE COEURS CONTINUE EN ARRIÈRE-PLAN --- */
        #hearts-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .ambient-heart {
            position: absolute;
            color: var(--text-color);
            opacity: 0.4;
            animation: floatUpwards 5s linear infinite;
        }

        @keyframes floatUpwards {
            0% { transform: translateY(105vh) scale(0.5); opacity: 0; }
            15% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- CONTENEUR PRINCIPAL --- */
        .main-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            color: var(--text-color);
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        /* Ton image locale fleur.png */
        .flower-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            margin-bottom: 40px;
        }

        /* Bouton clic stylisé et moderne */
        .click-btn {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 93, 143, 0.4);
        }

        .click-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 93, 143, 0.6);
        }

        /* --- LA LETTRE SURPRISE (MODAL BLANC) --- */
        .overlay-letter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .overlay-letter.show {
            display: flex;
            opacity: 1;
        }

        .paper-letter {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
            transform: scale(0.85);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .overlay-letter.show .paper-letter {
            transform: scale(1);
        }

        .letter-text {
            color: #333333; /* Texte de la lettre sombre pour une lecture parfaite */
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 400;
            margin-bottom: 30px;
        }

        /* Bouton fermer épuré */
        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 5px 10px;
            transition: opacity 0.2s;
        }

        .close-btn:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Fond de cœurs volants -->
    <div id="hearts-background"></div>

    <!-- Conteneur principal (Première vue) -->
    <div class="main-container">
        <h1>Pour la future mère de mes enfants</h1>
        
        <!-- Ton image fleur.png appelée directement -->
        <img class="flower-image" src="fleur.png" alt="Fleurs">
        
        <br>
        <button class="click-btn" onclick="openLetter(event)">clic</button>
    </div>

    <!-- Fenêtre de la lettre en papier blanc (Sans Emojis) -->
    <div class="overlay-letter" id="letterOverlay" onclick="closeLetter()">
        <div class="paper-letter" onclick="event.stopPropagation()">
            <div class="letter-text">
                Désolé du retard. J'étais en train de coder le site.<br><br>
                Je sais que c'est compliqué entre nous en ce moment. Mais je t'aime ma future femme de mes enfants.
            </div>
            <button class="close-btn" onclick="closeLetter()">Fermer</button>
        </div>
    </div>

    <!-- SCRIPT DES SYSTEMES DE COEURS -->
    <script>
        const overlay = document.getElementById('letterOverlay');
        const backgroundContainer = document.getElementById('hearts-background');

        function openLetter(e) {
            e.stopPropagation();
            overlay.classList.add('show');
        }

        function closeLetter() {
            overlay.classList.remove('show');
        }

        // Générateur automatique de cœurs en arrière-plan
        function createAmbientHeart() {
            const heart = document.createElement('div');
            heart.classList.add('ambient-heart');
            heart.innerHTML = '❤️';
            
            // Position de départ aléatoire sur la largeur
            heart.style.left = Math.random() * 100 + 'vw';
            // Vitesse aléatoire
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            // Taille aléatoire
            heart.style.fontSize = (Math.random() * 15 + 12) + 'px';
            
            backgroundContainer.appendChild(heart);

            // Nettoyage du cœur après l'animation
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Lance la pluie de cœurs continue dès le chargement
        setInterval(createAmbientHeart, 400);
    </script>
</body>
</html>
